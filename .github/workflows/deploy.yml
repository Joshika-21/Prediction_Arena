name: Deploy Prediction Service

on:
  push:
    branches:
      - main
    paths:
      - 'services/prediction/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Azure Container Registry
      uses: docker/login-action@v2
      with:
        registry: predictionarenaregistry.azurecr.io
        username: predictionarenaregistry
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./services/prediction
        platforms: linux/amd64
        push: true
        tags: predictionarenaregistry.azurecr.io/prediction-service:latest

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Container Apps
      run: |
        az containerapp update \
          --name prediction-service \
          --resource-group prediction-arena-rg \
          --image predictionarenaregistry.azurecr.io/prediction-service:latest